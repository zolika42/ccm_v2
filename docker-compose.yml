services:
  postgres:
    image: postgres:18-bookworm
    container_name: ccm_v2_postgres
    environment:
      POSTGRES_USER: ${LEGACY_DB_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${LEGACY_DB_SUPERUSER_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${LEGACY_DB_SUPERUSER:-postgres} -d postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ccm_v2_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /var/www/html/apps/api
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-columbiagames_session}
      SESSION_SECURE: ${SESSION_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CORS_ALLOW_DDEV: ${CORS_ALLOW_DDEV:-true}
      CG_CCM_DB_HOST: postgres
      CG_CCM_DB_PORT: 5432
      CG_CCM_DB_NAME: ${CG_CCM_DB_NAME:-ccm}
      CG_CCM_DB_USER: ${CG_CCM_DB_USER:-postgres}
      CG_CCM_DB_PASSWORD: ${CG_CCM_DB_PASSWORD:-postgres}
      CG_STORE_DB_HOST: postgres
      CG_STORE_DB_PORT: 5432
      CG_STORE_DB_NAME: ${CG_STORE_DB_NAME:-columbia_games}
      CG_STORE_DB_USER: ${CG_STORE_DB_USER:-postgres}
      CG_STORE_DB_PASSWORD: ${CG_STORE_DB_PASSWORD:-postgres}
      CG_REWRITE_DB_HOST: postgres
      CG_REWRITE_DB_PORT: 5432
      CG_REWRITE_DB_NAME: ${CG_REWRITE_DB_NAME:-columbia_rewrite}
      CG_REWRITE_DB_USER: ${CG_REWRITE_DB_USER:-postgres}
      CG_REWRITE_DB_PASSWORD: ${CG_REWRITE_DB_PASSWORD:-postgres}
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    volumes:
      - ./:/var/www/html
    command: >
      sh -lc "php -S 0.0.0.0:${API_PORT:-8080} -t public"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ccm_v2_web
    restart: unless-stopped
    depends_on:
      - api
    working_dir: /var/www/html/apps/web
    environment:
      WEB_PORT: ${WEB_PORT:-5173}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_LEGACY_MEDIA_BASE_URL: ${VITE_LEGACY_MEDIA_BASE_URL:-https://secure.columbiagames.com/pix/}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
      - web_node_modules:/var/www/html/apps/web/node_modules
    command: >
      sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port ${WEB_PORT:-5173}"

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: ccm_v2_pgadmin
    restart: unless-stopped
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ccm-v2.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_DISABLE_POSTFIX: "1"
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
volumes:
  postgres_data:
  web_node_modules:
  pgadmin_data:
