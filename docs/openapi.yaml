openapi: 3.1.0
info:
  title: ColumbiaGames Rewrite API
  version: 0.1.0
  description: >-
    Starter contract for auth, catalog, cart, checkout and library endpoints.
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: columbiagames_session
  schemas:
    Meta:
      type: object
      required: [requestId, method, path, durationMs]
      properties:
        requestId:
          type: string
        method:
          type: string
        path:
          type: string
        durationMs:
          type: integer
        identity:
          type: object
          additionalProperties: true
    Error:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    EnvelopeSuccess:
      type: object
      required: [ok, data, meta]
      properties:
        ok:
          type: boolean
          const: true
        data: {}
        meta:
          $ref: '#/components/schemas/Meta'
    EnvelopeError:
      type: object
      required: [ok, error, meta]
      properties:
        ok:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/Error'
        meta:
          $ref: '#/components/schemas/Meta'
    AuthUser:
      type: object
      required: [customerId, email, name, points]
      properties:
        customerId:
          type: integer
        email:
          type: string
        name:
          type: string
        points:
          type: integer
        shipPhone:
          type: string
        shipStreet:
          type: string
        shipStreet2:
          type: string
        shipCity:
          type: string
        shipState:
          type: string
        shipZip:
          type: string
        shipCountry:
          type: string
        billName:
          type: string
        billStreet:
          type: string
        billStreet2:
          type: string
        billCity:
          type: string
        billState:
          type: string
        billZip:
          type: string
        billCountry:
          type: string
        payCardType:
          type: string
        payCardMonth:
          type: string
        payCardYear:
          type: string
        payCardName:
          type: string
        payCardLast4:
          type: string
        authPersistence:
          type: string
        browserId:
          oneOf:
            - type: string
            - type: 'null'
    Product:
      type: object
      properties:
        productId:
          type: string
        description:
          type: string
        price:
          type: string
        category:
          type: string
        subCategory:
          type: string
        isDownloadable:
          type: boolean
        downloadableFilename:
          type: string
    CatalogSubCategory:
      type: object
      required: [name, productCount]
      properties:
        name:
          type: string
        productCount:
          type: integer
    CatalogCategory:
      type: object
      required: [name, productCount, subCategories]
      properties:
        name:
          type: string
        productCount:
          type: integer
        subCategories:
          type: array
          items:
            $ref: '#/components/schemas/CatalogSubCategory'
    CartSummary:
      type: object
      properties:
        itemCount:
          type: integer
        uniqueItemCount:
          type: integer
        subtotal:
          type: number
        subtotalFormatted:
          type: string
        currency:
          type: string
        hasItems:
          type: boolean
    Cart:
      type: object
      properties:
        browserId:
          type: string
        orderId:
          oneOf:
            - type: string
            - type: integer
            - type: 'null'
        storage:
          type: string
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        summary:
          $ref: '#/components/schemas/CartSummary'
    CheckoutState:
      type: object
      additionalProperties: true
    PasswordRecoveryPolicy:
      type: object
      additionalProperties: true
    LibraryState:
      type: object
      additionalProperties: true
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        '200':
          description: OK
  /openapi:
    get:
      operationId: getOpenapi
      summary: Download OpenAPI contract
      responses:
        '200':
          description: YAML document
  /auth/login:
    post:
      operationId: login
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
                rememberMe:
                  type: boolean
      responses:
        '200':
          description: Logged in
        '401':
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      summary: Create a new legacy-compatible customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password]
              properties:
                email:
                  type: string
                name:
                  type: string
                password:
                  type: string
                rememberMe:
                  type: boolean
      responses:
        '201':
          description: Customer created
        '409':
          description: Customer already exists
  /auth/logout:
    post:
      operationId: logout
      summary: Logout
      responses:
        '200':
          description: Logged out
  /auth/me:
    get:
      operationId: me
      summary: Current user
      responses:
        '200':
          description: Current user profile
        '401':
          description: Not authenticated

  /auth/profile:
    put:
      operationId: updateProfile
      summary: Update the authenticated customer profile
      responses:
        '200':
          description: Updated profile
        '401':
          description: Not authenticated
  /auth/password/reset:
    post:
      operationId: resetPassword
      summary: Change the authenticated customer's legacy password
      responses:
        '200':
          description: Password changed
        '401':
          description: Current password invalid or missing auth
  /auth/password/recovery-policy:
    get:
      operationId: getPasswordRecoveryPolicy
      summary: Current recovery/reset policy audit result
      responses:
        '200':
          description: Policy details
  /catalog/categories:
    get:
      operationId: getCatalogCategories
      summary: List catalog category hierarchy
      responses:
        '200':
          description: Category hierarchy
  /catalog/products:
    get:
      operationId: listProducts
      summary: List products
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: sub_category
          schema:
            type: string
      responses:
        '200':
          description: Product list
  /catalog/products/{productId}:
    get:
      operationId: getProduct
      summary: Product details
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
        '404':
          description: Product not found
  /catalog/products/{productId}/related:
    get:
      operationId: getRelatedProducts
      summary: Related products
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Related products
  /cart/identity:
    get:
      operationId: getCartIdentity
      summary: Resolve cart identity
      responses:
        '200':
          description: Identity
  /cart:
    get:
      operationId: getCart
      summary: Read active cart
      responses:
        '200':
          description: Cart state
  /cart/summary:
    get:
      operationId: getCartSummary
      summary: Read cart summary
      responses:
        '200':
          description: Cart summary
  /cart/items:
    post:
      operationId: addCartItem
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, quantity]
              properties:
                productId:
                  type: string
                quantity:
                  type: integer
      responses:
        '200':
          description: Updated cart
        '422':
          description: Validation error
  /cart/items/{productId}:
    patch:
      operationId: updateCartItem
      summary: Update item quantity
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
      responses:
        '200':
          description: Updated cart
        '422':
          description: Validation error
    delete:
      operationId: removeCartItem
      summary: Remove item from cart
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated cart
  /checkout/summary:
    get:
      operationId: getCheckoutSummary
      summary: Checkout summary
      responses:
        '200':
          description: Checkout state
  /checkout/validate:
    post:
      operationId: validateCheckout
      summary: Validate checkout draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Checkout validation result
  /checkout/submit:
    post:
      operationId: submitCheckout
      summary: Submit order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Submitted order
        '401':
          description: Not authenticated
        '422':
          description: Checkout validation error
  /library:
    get:
      operationId: getLibrary
      summary: Owned downloadable products
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Owned downloads
        '401':
          description: Not authenticated

  /library/{productId}/download:
    get:
      operationId: getLibraryDownload
      summary: Download an owned legacy downloadable product
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Binary download stream or redirect
        '401':
          description: Not authenticated
        '404':
          description: Product is not owned or file missing
        '409':
          description: File mapping is unsafe or unavailable
